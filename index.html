<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario Ferrer — Content design</title>
<meta name="description" content="Mario Ferrer, content design. Case studies on the way.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #FFF9F0;
    color: #2A2440;
    font-family: 'Inter', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid rgba(42,36,64,0.12);
    padding: 24px 32px;
  }

  .nameplate {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.01em;
    color: #2A2440;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 32px 64px;
  }

  .content {
    display: flex;
    align-items: center;
    gap: 56px;
    max-width: 780px;
    width: 100%;
  }

  .text-block {
    flex: 1;
    min-width: 0;
  }

  h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 32px;
    line-height: 1.25;
    color: #2A2440;
    margin: 0 0 20px;
  }

  h1 .nowrap {
    white-space: nowrap;
  }

  h1 .accent {
    color: #E01E63;
  }

  p {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    color: #4A4460;
    margin: 0;
  }

  p a {
    color: #0F7A50;
    font-weight: 500;
    text-decoration: underline;
  }

  p a:hover {
    color: #0B5C3D;
  }

  .portrait {
    flex-shrink: 0;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    overflow: hidden;
    background: #D9D5C7;
  }

  .portrait img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  footer {
    padding: 20px 32px;
    font-size: 13px;
    color: #8A8398;
  }

  @media (max-width: 640px) {
    .content {
      flex-direction: column-reverse;
      text-align: center;
      gap: 32px;
    }

    h1 {
      font-size: 26px;
    }

    .portrait {
      width: 140px;
      height: 140px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="nameplate">Mario Ferrer</div>
</header>

<main>
  <div class="content">
    <div class="text-block">
      <h1>
        Content design,<br>
        <span class="nowrap">systems thinking</span>,<br>
        and a few good stories<br>
        about tacos and IA.<br>
        <span class="accent">Coming soon.</span>
      </h1>
      <p>Case studies on the way. In the meantime, check out my <a href="https://www.linkedin.com/in/marioferrer/" target="_blank" rel="noopener">LinkedIn</a>.</p>
    </div>
    <div class="portrait">
      <img src="images/mario-portrait.jpg" alt="Mario Ferrer" width="720" height="720">
    </div>
  </div>
</main>

<footer>
  &copy; 2026 Mario Ferrer
</footer>

</body>
</html>
